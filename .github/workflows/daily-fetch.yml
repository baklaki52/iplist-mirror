name: daily-fetch

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch: {}

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq, curl, bgpq4
        run: sudo apt-get update && sudo apt-get install -y jq curl bgpq4

      - name: Fetch + normalize
        run: bash scripts/fetch.sh

      - name: Diff vs previous main + critical-IP regression gate
        # Compares the freshly built snapshot-ru-clean.json against the one
        # currently on main. Fails (exit 1) if any IP in the CRITICAL_IPS
        # list (Gemini, YouTube, OpenAI, Telegram, etc.) lost coverage —
        # blocks the commit so prod stays on the last-known-good snapshot.
        # Removed CIDRs without critical impact = printed as warning, not blocking.
        run: |
          # Save freshly built snapshot aside
          cp snapshot-ru-clean.json /tmp/candidate-ru-clean.json

          # Restore origin/main snapshot for comparison baseline
          git fetch origin main --quiet
          if git show origin/main:snapshot-ru-clean.json > /tmp/main-ru-clean.json 2>/dev/null; then
            echo "::group::Snapshot diff vs origin/main"
            python3 scripts/diff_snapshots.py /tmp/main-ru-clean.json /tmp/candidate-ru-clean.json
            EC=$?
            echo "::endgroup::"
            if [ $EC -ne 0 ]; then
              echo "::error::Critical IP regression — refusing to publish broken snapshot"
              echo "Restore prior snapshot to leave prod untouched:"
              cp /tmp/main-ru-clean.json snapshot-ru-clean.json
              # Also restore .sha256 to match
              git show origin/main:snapshot-ru-clean.sha256 > snapshot-ru-clean.sha256 2>/dev/null || true
              exit 1
            fi
          else
            echo "::warning::origin/main has no snapshot-ru-clean.json yet — skipping diff (first run)"
          fi

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ github.token }}
          # Use github.ref_name so workflow_dispatch on a feature branch
          # pushes back to that branch instead of failing on missing main.
          # On the daily schedule this resolves to "main" as before.
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          TRACKED="snapshot.json snapshot.sha256 snapshot-ru-clean.json snapshot-ru-clean.sha256 ru_filter_report.json"
          if [[ -z "$(git status --porcelain -- $TRACKED)" ]]; then
            echo "snapshots unchanged — skip commit"
            exit 0
          fi
          TAG="v$(date -u +%Y%m%d)"
          git config user.name  "iplist-mirror-bot"
          git config user.email "iplist-mirror-bot@users.noreply.github.com"
          # Add only files that exist (filter_ru may have skipped on upstream failure).
          for f in $TRACKED; do
            [[ -f "$f" ]] && git add "$f"
          done
          git commit -m "snapshot: $(date -u +%Y-%m-%d)"
          # Tag only on the main branch — feature branches just get the commit.
          if [[ "$TARGET_BRANCH" == "main" ]] && ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push --follow-tags origin "HEAD:$TARGET_BRANCH"
          else
            [[ "$TARGET_BRANCH" == "main" ]] && echo "tag $TAG already exists — push commit only"
            git push origin "HEAD:$TARGET_BRANCH"
          fi
