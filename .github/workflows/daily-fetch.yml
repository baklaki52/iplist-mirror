name: daily-fetch

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  workflow_dispatch: {}

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install jq & curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Fetch + normalize
        run: bash scripts/fetch.sh

      - name: Commit if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TRACKED="snapshot.json snapshot.sha256 snapshot-ru-clean.json snapshot-ru-clean.sha256 ru_filter_report.json"
          if [[ -z "$(git status --porcelain -- $TRACKED)" ]]; then
            echo "snapshots unchanged — skip commit"
            exit 0
          fi
          TAG="v$(date -u +%Y%m%d)"
          git config user.name  "iplist-mirror-bot"
          git config user.email "iplist-mirror-bot@users.noreply.github.com"
          # Add only files that exist (filter_ru may have skipped on upstream failure).
          for f in $TRACKED; do
            [[ -f "$f" ]] && git add "$f"
          done
          git commit -m "snapshot: $(date -u +%Y-%m-%d)"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists — push commit only"
            git push origin main
          else
            git tag "$TAG"
            git push --follow-tags origin main
          fi
